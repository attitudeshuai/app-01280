# =====================================================
# 电影票预订系统 - 应用配置
# =====================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: movie-ticket-backend
  
  profiles:
    active: dev
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/movie_ticket?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: MovieTicketHikariPool
      max-lifetime: 1800000
      connection-timeout: 30000
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 20
          max-wait: -1
          max-idle: 10
          min-idle: 5

# =====================================================
# MyBatis-Plus 配置
# =====================================================
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.movieticket.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# =====================================================
# Sa-Token 配置
# =====================================================
sa-token:
  # token 名称 (同时也是 cookie 名称)
  token-name: satoken
  # token 有效期 (单位: 秒) 默认7天
  timeout: 604800
  # token 最低活跃频率 (单位: 秒) 如果 token 超过此时间没有访问系统就会被冻结
  active-timeout: 86400
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 在多人登录同一账号时, 是否共用一个 token
  is-share: false
  # token 风格 (uuid, simple-uuid, random-32, random-64, random-128, tik)
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # 是否从 cookie 中读取 token
  is-read-cookie: false
  # 是否从 header 中读取 token
  is-read-header: true

# =====================================================
# Knife4j API 文档配置
# =====================================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.movieticket.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表

# =====================================================
# Actuator 健康检查配置
# =====================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# =====================================================
# 日志配置
# =====================================================
logging:
  level:
    root: INFO
    com.movieticket: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
