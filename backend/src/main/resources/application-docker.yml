# =====================================================
# Docker 环境配置
# =====================================================

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/movie_ticket?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456
  
  data:
    redis:
      host: redis
      port: 6379

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: INFO
    com.movieticket: INFO
    com.baomidou.mybatisplus: WARN
